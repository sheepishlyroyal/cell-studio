<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1540 50%, #0f0d2b 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      filter: blur(80px);
      animation: float 20s infinite ease-in-out;
    }

    .orb1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #7cf9ff, transparent);
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }

    .orb2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #b44dff, transparent);
      bottom: -150px;
      left: -150px;
      animation-delay: 5s;
    }

    .orb3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #ff3b4c, transparent);
      top: 50%;
      left: 10%;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -30px); }
      66% { transform: translate(-20px, 20px); }
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
      max-width: 600px;
    }

    .header-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7cf9ff 0%, #b44dff 50%, #ff3b4c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(124, 249, 255, 0.2);
      animation: glow-pulse 3s ease-in-out infinite;
      margin: 0;
    }

    .header-image {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 0 20px rgba(124, 249, 255, 0.3);
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(124, 249, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(180, 77, 255, 0.5)); }
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #7cf9ff, transparent);
      margin: 2rem 0;
      opacity: 0.6;
    }

    .credit {
      font-size: 1.2rem;
      color: #ecefff;
      margin-top: 2rem;
    }

    .github-link {
      display: inline-block;
      margin-top: 1rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #7cf9ff, #b44dff);
      color: #0a0e27;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
    }

    .github-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ff3b4c, #ffd23b);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .github-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(124, 249, 255, 0.3);
      border-color: #7cf9ff;
    }

    .github-link:hover::before {
      opacity: 1;
    }

    .scan-line {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="bg-animated">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="container">
    <div class="header-section">
      <h1>heh this is pretty cool</h1>
      <img src="img.jpeg" alt="cool image" class="header-image">
    </div>
    <div class="divider"></div>
    <p class="credit">
      github from <strong>Leon Fernandes</strong><br>
      <a href="https://github.com/sheepishlyroyal" class="github-link">
        → github :)
      </a>
    </p>
  </div>

  <div class="scan-line"></div>
</body>
</html>
